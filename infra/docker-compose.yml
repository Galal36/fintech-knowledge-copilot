services:
  db:
    image: postgres:16-alpine
    container_name: fintech-knowledge-copilot-db
    environment:
      POSTGRES_DB: fintech_knowledge_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fintech-knowledge-copilot-api
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fintech_knowledge_copilot
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fintech-knowledge-copilot-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  postgres_data:
